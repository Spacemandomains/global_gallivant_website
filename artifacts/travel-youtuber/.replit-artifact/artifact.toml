kind = "video"
previewPath = "/"
title = "Travel YouTuber Landing Page"
version = "1.0.0"
id = "artifacts/travel-youtuber"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23415

[services.development]
run = "pnpm --filter @workspace/travel-youtuber run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-youtuber", "run", "build" ]
publicDir = "artifacts/travel-youtuber/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23415"
BASE_PATH = "/"
